name: Lint marketplace

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint marketplace.json (versioning hygiene + source resolution)
        run: node scripts/check-marketplace.mjs
      - name: Run lint tests
        run: node --test scripts/*.test.mjs
